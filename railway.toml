[build]
builder = "NIXPACKS"
buildCommand = "npx --no-install prisma generate && npm run build"

[deploy]
# Run Prisma migrations before starting the server
startCommand = "npx prisma migrate deploy && HOSTNAME=0.0.0.0 node .next/standalone/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "tealregistry-web"
