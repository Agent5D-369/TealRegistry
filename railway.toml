[build]
builder = "NIXPACKS"
buildCommand = "npx --no-install prisma generate && npm run build"

[deploy]
startCommand = "npx --no-install prisma migrate deploy && node .next/standalone/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "tealregistry-web"
